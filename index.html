<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totem BRASCRS / Vöiston</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- ============ HOME ============ -->
    <section id="view-home" class="view active">
      <div class="container">
        <!-- Banner topo: 2 colunas (Vöiston | BRASCRS Conecta 360) -->
        <div class="banner-row">
          <div
            class="banner banner-cell is-clickable"
            id="banner-tl"
            data-action="lio"
            role="button"
            tabindex="0"
            aria-label="Abrir Assistente Cálculo LIO"
          >
            <div class="banner-track"></div>
          </div>
          <div class="banner banner-cell" id="banner-tr">
            <div class="banner-track"></div>
          </div>
        </div>

        <!-- Cards -->
        <div class="cards">
          <button class="card" data-action="portal">
            <div class="card-icon">
              <img
                src="assets/icons/icon-portal.svg"
                alt=""
                onerror="this.style.display = 'none'"
              />
            </div>
            <div class="card-text">
              <h2>Novo Portal</h2>
              <p>Acesse a versão beta do novo portal da BRASCRS.</p>
            </div>
          </button>

          <button
            class="card"
            style="justify-content: space-between"
            data-action="lio"
          >
            <div style="display: flex; align-items: center; gap: 16px">
              <div class="card-icon">
                <img
                  src="assets/icons/icon-lio.svg"
                  alt=""
                  onerror="this.style.display = 'none'"
                />
              </div>
              <div class="card-text">
                <h2>Assistente Cálculo LIO</h2>
                <p>
                  Cálculo de lente intraocular gratuíto para associados BRASCRS.
                </p>
                <div style="display: flex; align-items: center">
                  <img
                    src="assets/logos/logo-jnj.png"
                    alt="Johnson & Johnson"
                    style="
                      max-width: 100%;
                      height: 100px;
                      margin: -25px 0 -30px -10px;
                    "
                  />
                  <img
                    src="assets/logos/logo-voiston.png"
                    alt="Vöiston"
                    style="max-width: 100%; height: 17px"
                  />
                </div>
              </div>
            </div>
            <img
              src="assets/banners/banner_alexa.png"
              alt="Banner Alexa"
              style="max-width: 100%; height: 100px; border-radius: 24px"
            />
          </button>

          <button class="card" data-action="laudo">
            <div class="card-icon">
              <img
                src="assets/icons/icon-laudo.svg"
                alt=""
                onerror="this.style.display = 'none'"
              />
            </div>
            <div class="card-text">
              <h2>Assistente de Laudo</h2>
              <p>
                Assistente de laudo Vöiston para associados BRASCRS em breve.
              </p>
              <div style="display: flex; align-items: center">
                <img
                  src="assets/logos/logo-jnj.png"
                  alt="Johnson & Johnson"
                  style="
                    max-width: 100%;
                    height: 100px;
                    margin: -25px 0 -30px -10px;
                  "
                />
                <img
                  src="assets/logos/logo-voiston.png"
                  alt="Vöiston"
                  style="max-width: 100%; height: 17px"
                />
              </div>
            </div>
          </button>
        </div>

        <!-- Banner rodapé: 2 colunas (Vídeo BRASCRS | QR Code) -->
        <div class="banner-row">
          <div class="banner banner-cell" id="banner-bl">
            <div class="banner-track"></div>
          </div>
          <div class="banner banner-cell" id="banner-br">
            <div class="banner-track"></div>
          </div>
        </div>

        <!-- Rodapé: disclaimer + divisor + logos -->
        <footer class="page-footer">
          <p class="footer-disclaimer">Ambiente de demonstração.</p>
          <p class="footer-disclaimer">
            Tempos de processamento e respostas exibidas podem diferir do
            produto em produção.
          </p>
          <hr class="footer-divider" />
          <div class="logos" id="logos-home"></div>
        </footer>
      </div>
    </section>

    <!-- ============ NOVO PORTAL ============ -->
    <section id="view-portal" class="view">
      <div class="container">
        <div class="portal-topbar">
          <button class="btn-home" data-action="home">← voltar</button>
          <button
            class="portal-logo-btn"
            type="button"
            id="btn-portal-video"
            title="Toque para assistir ao vídeo Conecta 360"
            aria-label="Reproduzir vídeo do BRASCRS Conecta 360"
          >
            <img
              src="assets/portal/brascrs-conecta360.png"
              alt="BRASCRS Conecta 360"
            />
            <span class="portal-logo-play" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="14"
                height="14"
                fill="currentColor"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            </span>
          </button>
          <span class="portal-topbar-spacer" aria-hidden="true"></span>
        </div>
        <div class="iframe-wrap">
          <iframe
            id="iframe-portal"
            src="about:blank"
            allow="fullscreen"
            referrerpolicy="no-referrer"
          ></iframe>
        </div>
        <div class="logos" id="logos-portal"></div>
      </div>
    </section>

    <!-- ============ ASSISTENTE LIO ============ -->
    <section id="view-lio" class="view">
      <div class="container">
        <button class="btn-home" data-action="home">← voltar</button>
        <div class="iframe-wrap">
          <iframe
            id="iframe-lio"
            src="about:blank"
            allow="fullscreen"
            referrerpolicy="no-referrer"
          ></iframe>
        </div>
        <div class="logos" id="logos-lio"></div>
      </div>
    </section>

    <!-- ============ ASSISTENTE DE LAUDO ============ -->
    <section id="view-laudo" class="view">
      <div class="container">
        <button class="btn-home" data-action="home">← voltar</button>

        <div class="exames-grid" id="exames-grid"></div>

        <div class="laudo-area" id="laudo-area">
          <div class="laudo-placeholder">
            <h2>Assistente de Laudo Vöiston</h2>
            <p>Selecione um exame acima para iniciar a análise.</p>
          </div>
        </div>

        <div class="logos" id="logos-laudo"></div>
      </div>
    </section>

    <script src="js/carousel.js"></script>
    <script src="js/laudo.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
